<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>
        // GitHub Pages SPA redirect
        // Stores the full URL and redirects to index.html
        sessionStorage.redirect = location.href;
        location.replace(
            location.pathname.split('/').slice(0, 2).join('/') + '/'
        );
    </script>
</head>

<body>
</body>

</html>
