<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>
        // GitHub Pages SPA redirect
        // Converts missing paths to hashes (e.g. /explore -> #/explore)
        var path = location.pathname.replace('/Learning_platform', '');
        var search = location.search;
        var hash = location.hash;

        // Never route backend API paths through the hash-based frontend router.
        if (path === '/api' || path.indexOf('/api/') === 0) {
            document.addEventListener('DOMContentLoaded', function () {
                document.body.textContent = 'API endpoint not found.';
            });
        } else {
        // Redirect to root with the path as a hash
            location.replace('/Learning_platform/#' + path + search + hash);
        }
    </script>
</head>

<body>
</body>

</html>
