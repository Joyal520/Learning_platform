<body>
    <!-- Auto-fullscreen on first interaction -->
    <script>
        (function () {
            function tryAutoFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log('Fullscreen requires user interaction'));
                }
                document.removeEventListener('click', tryAutoFullscreen, true);
                document.removeEventListener('keydown', tryAutoFullscreen, true);
            }
            document.addEventListener('click', tryAutoFullscreen, { once: true, capture: true });
            document.addEventListener('keydown', tryAutoFullscreen, { once: true, capture: true });

            document.addEventListener('fullscreenchange', () => {
                document.body.classList.toggle('is-fullscreen', !!document.fullscreenElement);
            });
        })();
    </script>
