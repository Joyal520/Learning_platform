<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDTECHRA — Student Creator Hub</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <meta name="description" content="A platform for students to explore, upload, and share creative works.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- GitHub Pages SPA redirect handler -->
    <script>
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
</head>

<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="main-nav">
            <div class="container">
                <a href="#" class="logo" id="nav-home">EDTECHRA</a>
                <div class="nav-links" id="nav-links">
                    <!-- Dynamic links injected here -->
                </div>
                <div class="nav-auth" id="nav-auth">
                    <!-- Auth buttons injected here -->
                </div>
                <button class="mobile-menu-toggle" id="menu-toggle">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content" class="container">
            <!-- Dynamic pages injected here -->
        </main>

        <!-- Global Loader -->
        <div id="loader" class="page-loader hidden">
            <div class="spinner"></div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="assets/js/supabase.js"></script>
    <script type="module" src="assets/js/ui.js"></script>
    <script type="module" src="assets/js/auth.js"></script>
    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>

</html>
